name: Research Refresh

on:
  schedule:
    - cron: "0 */3 * * 1-5"
    - cron: "0 14 * * 6"
  workflow_dispatch:
    inputs:
      trigger:
        description: Pipeline trigger reason
        type: choice
        required: true
        default: manual
        options:
          - manual
          - event
          - scheduled

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve trigger
        id: trigger
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.trigger }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 14 * * 6" ]; then
            echo "value=scheduled" >> "$GITHUB_OUTPUT"
          else
            echo "value=event" >> "$GITHUB_OUTPUT"
          fi

      - name: Poll high-signal events
        run: python3 scripts/research_ops.py poll --trigger "${{ steps.trigger.outputs.value }}"

      - name: Commit ledger and cursor updates to main
        id: runtime_commit
        run: |
          if git diff --quiet -- research; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "stock-research-bot"
          git config user.email "actions@users.noreply.github.com"
          git add research
          git commit -m "chore: ingest research events"
          git push origin HEAD:main
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Refresh workspace after main update
        if: steps.runtime_commit.outputs.changed == 'true'
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Generate reviewable draft refreshes
        run: python3 scripts/research_ops.py draft-refresh --trigger "${{ steps.trigger.outputs.value }}"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}

      - name: Check draft diff
        id: draft_diff
        run: |
          if git diff --quiet -- research; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update refresh PR
        if: steps.draft_diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: automation/research-refresh
          delete-branch: false
          title: "chore: automated research refresh"
          body-path: automation/run/pr-body.md
          commit-message: "chore: refresh living research drafts"
          add-paths: |
            research/**
          labels: |
            automation
            research
