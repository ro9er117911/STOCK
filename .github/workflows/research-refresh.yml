name: Research Refresh

on:
  schedule:
    - cron: "0 */3 * * 1-5"
    - cron: "0 14 * * 6"
  workflow_dispatch:
    inputs:
      trigger:
        description: Pipeline trigger reason
        type: choice
        required: true
        default: manual
        options:
          - manual
          - event
          - scheduled
      fixture:
        description: Optional test event fixture name
        type: string
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Resolve trigger
        id: trigger
        run: |
          fixture="${{ github.event.inputs.fixture }}"
          fixture_slug="$(printf '%s' "$fixture" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9' '-')"
          fixture_slug="${fixture_slug#-}"
          fixture_slug="${fixture_slug%-}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.trigger }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 14 * * 6" ]; then
            echo "value=scheduled" >> "$GITHUB_OUTPUT"
          else
            echo "value=event" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "$fixture_slug" ]; then
            echo "fixture=${{ github.event.inputs.fixture }}" >> "$GITHUB_OUTPUT"
            echo "pr_branch=automation/research-refresh-fixture-$fixture_slug" >> "$GITHUB_OUTPUT"
            echo "pr_title=test: automated research refresh ($fixture_slug)" >> "$GITHUB_OUTPUT"
          else
            echo "fixture=" >> "$GITHUB_OUTPUT"
            echo "pr_branch=automation/research-refresh" >> "$GITHUB_OUTPUT"
            echo "pr_title=chore: automated research refresh" >> "$GITHUB_OUTPUT"
          fi

      - name: Poll high-signal events
        run: |
          if [ -n "${{ steps.trigger.outputs.fixture }}" ]; then
            python3 scripts/research_ops.py poll --trigger "${{ steps.trigger.outputs.value }}" --fixture "${{ steps.trigger.outputs.fixture }}"
          else
            python3 scripts/research_ops.py poll --trigger "${{ steps.trigger.outputs.value }}"
          fi

      - name: Commit ledger and cursor updates to main
        id: runtime_commit
        if: steps.trigger.outputs.fixture == ''
        run: |
          if git diff --quiet -- research; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "stock-research-bot"
          git config user.email "actions@users.noreply.github.com"
          git add research
          git commit -m "chore: ingest research events"
          git push origin HEAD:main
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Refresh workspace after main update
        if: steps.runtime_commit.outputs.changed == 'true'
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Generate reviewable draft refreshes
        run: |
          if [ -n "${{ steps.trigger.outputs.fixture }}" ]; then
            python3 scripts/research_ops.py draft-refresh --trigger "${{ steps.trigger.outputs.value }}" --fixture "${{ steps.trigger.outputs.fixture }}"
          else
            python3 scripts/research_ops.py draft-refresh --trigger "${{ steps.trigger.outputs.value }}"
          fi
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          TRANSLATION_MODEL: gpt-4.1-mini

      - name: Check draft diff
        id: draft_diff
        run: |
          if git diff --quiet -- research; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update refresh PR
        if: steps.draft_diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          branch: ${{ steps.trigger.outputs.pr_branch }}
          delete-branch: false
          title: ${{ steps.trigger.outputs.pr_title }}
          body-path: automation/run/pr-body.zh-tw.md
          commit-message: "chore: refresh living research drafts"
          add-paths: |
            research/**
          labels: |
            automation
            research
