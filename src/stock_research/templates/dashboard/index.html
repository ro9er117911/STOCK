<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>投資駕駛艙</title>
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/dashboard.css">
  </head>
  <body data-dashboard-page="portfolio">
    <div class="ambient ambient-left"></div>
    <div class="ambient ambient-right"></div>
    <div class="grid-overlay"></div>
    <main class="app-shell">
      <section class="masthead">
        <div class="masthead-copy">
          <p class="eyebrow">Institutional Growth Cockpit</p>
          <h1>投資駕駛艙</h1>
          <p class="lede">先看真實部位、VIX regime 與熔斷警報，再看核心邏輯、事件、sizing 壓力與專案成熟度。這是本機私有 cockpit，不是展示用 landing page。</p>
        </div>
        <div class="masthead-strip" id="portfolio-summary-strip"></div>
      </section>

      <section class="overview-grid">
        <article class="panel panel-hero" id="portfolio-totals-panel"></article>
        <article class="panel" id="macro-regime-panel"></article>
        <article class="panel" id="risk-radar-panel"></article>
      </section>

      <section class="overview-grid overview-grid-secondary">
        <article class="panel" id="recent-progress-panel"></article>
        <article class="panel" id="gap-map-panel"></article>
        <article class="panel" id="analytics-panel"></article>
      </section>

      <section class="overview-grid overview-grid-observation">
        <article class="panel panel-emphasis" id="observation-command-panel"></article>
        <article class="panel" id="observation-lake-panel"></article>
        <article class="panel" id="watchlist-recommendations-panel"></article>
      </section>

      <section class="board two-column board-main">
        <article class="panel panel-emphasis">
          <div class="panel-head">
            <div>
              <p class="panel-kicker">Command Queue</p>
              <h2>今天優先處理</h2>
            </div>
          </div>
          <div id="priority-queue" class="priority-list"></div>
        </article>
        <article class="panel">
          <div class="panel-head">
            <div>
              <p class="panel-kicker">Coverage Signal</p>
              <h2>研究與持倉摘要</h2>
            </div>
          </div>
          <div id="summary-cards" class="summary-grid"></div>
        </article>
      </section>

      <section class="board two-column">
        <article class="panel panel-alert" id="exception-board" style="display: none;">
          <div class="panel-head">
            <div>
              <p class="panel-kicker panel-kicker-alert">Risk Alert</p>
              <h2>例外管理</h2>
            </div>
          </div>
          <div id="exception-queue" class="priority-list"></div>
        </article>

        <article class="panel">
          <div class="panel-head">
            <div>
              <p class="panel-kicker">Institutional Gaps</p>
              <h2>目前缺口總覽</h2>
            </div>
          </div>
          <div id="gap-summary-panel" class="summary-grid"></div>
        </article>
      </section>

      <section class="panel panel-controls">
        <div class="panel-head">
          <div>
            <p class="panel-kicker">Control Surface</p>
            <h2>篩選與排序</h2>
          </div>
        </div>
        <div class="controls">
          <label class="field">
            <span>排序方式</span>
            <select id="sort-select">
              <option value="priority">依處理優先度</option>
              <option value="review">依下次檢查日期</option>
              <option value="risk">依風險等級</option>
              <option value="confidence">依邏輯健康度</option>
            </select>
          </label>
          <label class="field">
            <span>部位狀態</span>
            <select id="position-filter">
              <option value="all">全部</option>
              <option value="has-position">只看已填部位</option>
              <option value="missing-position">只看未填部位</option>
            </select>
          </label>
          <label class="field">
            <span>風險等級</span>
            <select id="risk-filter">
              <option value="all">全部</option>
              <option value="high-conviction">高信念</option>
              <option value="core">核心</option>
              <option value="satellite">衛星</option>
              <option value="unset">未設定</option>
            </select>
          </label>
        </div>
      </section>

      <section class="section-head">
        <div>
          <p class="panel-kicker">Coverage</p>
          <h2>個股駕駛艙</h2>
        </div>
        <p class="section-note" id="portfolio-grid-meta"></p>
      </section>
      <section class="portfolio-grid" id="portfolio-grid"></section>
    </main>
    <div id="observation-modal-root"></div>
    <script src="./assets/dashboard.js"></script>
  </body>
</html>
