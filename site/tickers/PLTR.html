<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PLTR | Stock Research Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=IBM+Plex+Sans:wght@400;500;600&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/dashboard.css">
  </head>
  <body data-dashboard-page="ticker" data-digest-path="../data/tickers/PLTR.json">
    <div class="background-blobs">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
      <div class="blob blob-3"></div>
    </div>
    <main class="shell">
      <a class="back-link" href="../index.html">返回總覽</a>
      <section class="hero hero-compact">
        <p class="eyebrow">Stock Research Operator</p>
        <h1 id="ticker-title">PLTR</h1>
        <p class="hero-copy" id="ticker-summary"></p>
        <div class="hero-meta" id="ticker-meta"></div>
      </section>
      <section class="detail-grid">
        <article class="panel panel-primary">
          <div class="panel-header">
            <span class="panel-icon">📋</span>
            <h2>後續要做什麼</h2>
          </div>
          <p id="ticker-action" class="lead"></p>
          <div class="callout">
            <p class="callout-label">下一次要確認</p>
            <p id="ticker-next-data"></p>
          </div>
        </article>
        <article class="panel">
          <div class="panel-header">
            <span class="panel-icon">⚖️</span>
            <h2>關鍵動作規則</h2>
          </div>
          <div id="ticker-rules"></div>
        </article>
        <article class="panel">
          <div class="panel-header">
            <span class="panel-icon">✨</span>
            <h2>關鍵事件</h2>
          </div>
          <div id="ticker-events"></div>
        </article>
        <article class="panel">
          <div class="panel-header">
            <span class="panel-icon">🔗</span>
            <h2>來源白名單</h2>
          </div>
          <div id="ticker-sources"></div>
        </article>
      </section>
    </main>
    <script src="../assets/dashboard.js"></script>
  </body>
</html>
