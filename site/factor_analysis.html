<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Factor Analysis｜因子分析</title>
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/dashboard.css">
    <style>
      .kpi-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
        margin: 24px 0;
      }
      .kpi-card {
        background: var(--surface-1, #1a1a2e);
        border: 1px solid var(--border, #2d2d44);
        border-radius: 8px;
        padding: 20px;
      }
      .kpi-value {
        font-size: 2rem;
        font-weight: 700;
        color: var(--accent, #7c6cf8);
      }
      .kpi-label {
        font-size: 0.75rem;
        color: var(--text-muted, #888);
        text-transform: uppercase;
        margin-top: 4px;
      }

      .factor-table {
        width: 100%;
        border-collapse: collapse;
      }
      .factor-table th {
        padding: 10px 12px;
        text-align: left;
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-muted, #888);
        border-bottom: 1px solid var(--border, #2d2d44);
        cursor: pointer;
        white-space: nowrap;
      }
      .factor-table th.sorted {
        color: var(--accent, #7c6cf8);
      }
      .factor-table th.sorted::after {
        content: " ↓";
      }
      .factor-table td {
        padding: 12px;
        border-bottom: 1px solid var(--border-subtle, #1e1e30);
        font-size: 0.875rem;
        vertical-align: middle;
      }
      .factor-table tr:hover td {
        background: var(--surface-hover, #1e1e30);
      }

      .score-bar {
        background: var(--surface-2, #16213e);
        border-radius: 4px;
        height: 6px;
        width: 80px;
        overflow: hidden;
        margin-top: 4px;
      }
      .score-fill {
        height: 100%;
        background: var(--accent, #7c6cf8);
        border-radius: 4px;
        transition: width 0.3s;
      }
      .score-fill.high { background: #4CAF50; }
      .score-fill.mid  { background: #FF9800; }
      .score-fill.low  { background: #f44336; }

      .badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 0.7rem;
        font-weight: 600;
      }
      .badge-pass {
        background: rgba(76, 175, 80, 0.2);
        color: #4CAF50;
        border: 1px solid #4CAF50;
      }
      .badge-fail {
        background: rgba(244, 67, 54, 0.2);
        color: #f44336;
        border: 1px solid #f44336;
      }
      .badge-market {
        background: var(--surface-2, #16213e);
        color: var(--text-muted, #888);
        border: 1px solid var(--border, #2d2d44);
      }

      .maestro-score {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--accent, #7c6cf8);
      }
      .momentum-positive { color: #4CAF50; }
      .momentum-negative { color: #f44336; }

      .toolbar {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 16px;
        flex-wrap: wrap;
      }
      .toolbar-label {
        font-size: 0.7rem;
        text-transform: uppercase;
        color: var(--text-muted, #888);
        letter-spacing: 0.05em;
        margin-right: 4px;
      }
      .toolbar-divider {
        width: 1px;
        height: 20px;
        background: var(--border, #2d2d44);
        margin: 0 4px;
      }
      .sort-btn, .filter-btn {
        padding: 6px 12px;
        border-radius: 4px;
        border: 1px solid var(--border, #2d2d44);
        background: var(--surface-1, #1a1a2e);
        color: inherit;
        cursor: pointer;
        font-size: 0.75rem;
        font-family: inherit;
      }
      .sort-btn.active, .filter-btn.active {
        border-color: var(--accent, #7c6cf8);
        color: var(--accent, #7c6cf8);
      }
      .sort-btn:hover, .filter-btn:hover {
        background: var(--surface-hover, #1e1e30);
      }

      .ticker-link {
        text-decoration: none;
        color: var(--accent, #7c6cf8);
        font-weight: 600;
        font-family: 'IBM Plex Mono', monospace;
      }
      .ticker-link:hover { text-decoration: underline; }

      .score-cell {
        min-width: 90px;
      }
      .score-number {
        font-size: 0.8rem;
        font-family: 'IBM Plex Mono', monospace;
      }

      .rank-num {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.85rem;
        color: var(--text-muted, #888);
        font-weight: 600;
      }

      .ticker-cell {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .price-cell {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.85rem;
      }

      .vol-cell {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.85rem;
        color: var(--text-muted, #888);
      }

      .error-state {
        text-align: center;
        padding: 48px 24px;
        color: var(--text-muted, #888);
      }
      .error-state h3 {
        margin-bottom: 8px;
        color: var(--text, #ccc);
      }
      .error-state code {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.8rem;
        background: var(--surface-2, #16213e);
        padding: 2px 6px;
        border-radius: 4px;
      }

      .factor-section {
        margin-top: 0;
      }

      .table-wrapper {
        overflow-x: auto;
      }

      .footer-note {
        font-size: 0.75rem;
        color: var(--text-muted, #888);
        margin-top: 4px;
        line-height: 1.6;
      }
      .footer-note + .footer-note {
        margin-top: 2px;
      }
    </style>
  </head>
  <body data-dashboard-page="factor-analysis">
    <div class="ambient ambient-left"></div>
    <div class="ambient ambient-right"></div>
    <div class="grid-overlay"></div>
    <main class="app-shell">

      <!-- Masthead -->
      <section class="masthead">
        <div class="masthead-copy">
          <p class="eyebrow">Quantitative Screening</p>
          <h1>Factor Analysis</h1>
          <p class="lede">因子分析 + 流動性篩選</p>
          <div class="masthead-actions" style="margin-top: 20px;">
            <a href="./index.html" class="action-button" style="background: var(--surface-2); border: 1px solid var(--border);">← 返回駕駛艙</a>
          </div>
        </div>
      </section>

      <!-- KPI Summary Cards -->
      <div id="summary-section">
        <div class="kpi-grid" id="kpi-grid">
          <div class="kpi-card">
            <div class="kpi-value" id="kpi-total">—</div>
            <div class="kpi-label">Total Analyzed</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-value" id="kpi-pass">—</div>
            <div class="kpi-label">Liquidity PASS</div>
          </div>
          <div class="kpi-card">
            <div class="kpi-value" id="kpi-rate">—</div>
            <div class="kpi-label">Pass Rate %</div>
          </div>
        </div>
      </div>

      <!-- Factor Table Section -->
      <section class="panel factor-section">
        <div class="panel-head">
          <div>
            <p class="panel-kicker">Maestro Composite</p>
            <h2>因子評分總覽</h2>
          </div>
        </div>

        <!-- Toolbar -->
        <div class="toolbar" id="toolbar">
          <span class="toolbar-label">排序</span>
          <button class="sort-btn active" data-sort="maestro_score">Maestro Score</button>
          <button class="sort-btn" data-sort="momentum_6m">6M Momentum</button>
          <button class="sort-btn" data-sort="quality_score">Quality</button>
          <button class="sort-btn" data-sort="liquidity_daily_vol">Liquidity</button>
          <div class="toolbar-divider"></div>
          <span class="toolbar-label">篩選</span>
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="pass">PASS only</button>
          <button class="filter-btn" data-filter="fail">FAIL only</button>
        </div>

        <!-- Table -->
        <div class="table-wrapper">
          <table class="factor-table" id="factor-table">
            <thead>
              <tr>
                <th data-col="rank">Rank</th>
                <th data-col="ticker">Ticker</th>
                <th data-col="current_price">Price</th>
                <th data-col="quality_score">Quality</th>
                <th data-col="value_score">Value</th>
                <th data-col="momentum_score">Momentum</th>
                <th data-col="maestro_score">Maestro</th>
                <th data-col="momentum_6m">6M Mom %</th>
                <th data-col="liquidity_daily_vol">Daily Vol</th>
                <th data-col="liquidity_pass">Liquidity</th>
              </tr>
            </thead>
            <tbody id="factor-tbody">
              <tr>
                <td colspan="10" style="text-align: center; padding: 32px; color: var(--text-muted, #888);">載入中…</td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- Footer -->
        <div style="margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border, #2d2d44);">
          <p class="footer-note">流動性門檻：日均成交金額 &gt; 10M 當地幣別</p>
          <p class="footer-note">數據來源：yfinance / FinMind</p>
        </div>
      </section>

    </main>

    <script>
      // ─── State ───────────────────────────────────────────────────────────────
      let allData = [];
      let currentSort = 'maestro_score';
      let currentFilter = 'all';

      // ─── Helpers ─────────────────────────────────────────────────────────────
      function scoreClass(score) {
        if (score === null || score === undefined) return '';
        if (score >= 70) return 'high';
        if (score >= 40) return 'mid';
        return 'low';
      }

      function scoreBar(score) {
        if (score === null || score === undefined) return '—';
        const cls = scoreClass(score);
        const pct = Math.min(100, Math.max(0, score));
        return `
          <div class="score-number">${score.toFixed(0)}</div>
          <div class="score-bar">
            <div class="score-fill ${cls}" style="width: ${pct}%"></div>
          </div>
        `;
      }

      function formatVol(vol) {
        if (vol === null || vol === undefined) return '—';
        if (vol >= 1e9) return (vol / 1e9).toFixed(1) + 'B';
        if (vol >= 1e6) return (vol / 1e6).toFixed(1) + 'M';
        if (vol >= 1e3) return (vol / 1e3).toFixed(0) + 'K';
        return vol.toFixed(0);
      }

      function formatPrice(price, currency) {
        if (price === null || price === undefined) return '—';
        const sym = currency === 'TWD' ? 'NT$' : currency === 'USD' ? '$' : (currency || '') + ' ';
        return sym + price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }

      function formatMomentum(pct) {
        if (pct === null || pct === undefined) return '—';
        const cls = pct >= 0 ? 'momentum-positive' : 'momentum-negative';
        const sign = pct >= 0 ? '+' : '';
        return `<span class="${cls}">${sign}${pct.toFixed(1)}%</span>`;
      }

      // ─── Render ───────────────────────────────────────────────────────────────
      function renderSummary(summary) {
        const total = summary.total_analyzed ?? allData.length;
        const pass  = summary.liquidity_pass ?? allData.filter(d => d.liquidity_pass).length;
        const rate  = total > 0 ? ((pass / total) * 100).toFixed(1) : '0.0';

        document.getElementById('kpi-total').textContent = total;
        document.getElementById('kpi-pass').textContent  = pass;
        document.getElementById('kpi-rate').textContent  = rate + '%';
      }

      function renderTickerRow(ticker, rank) {
        const market = ticker.market || '';
        const tickerLink = `./tickers/${ticker.ticker}.html`;

        return `
          <tr data-liquidity="${ticker.liquidity_pass ? 'pass' : 'fail'}">
            <td><span class="rank-num">${rank}</span></td>
            <td>
              <div class="ticker-cell">
                <a href="${tickerLink}" class="ticker-link">${ticker.ticker}</a>
                ${market ? `<span class="badge badge-market">${market}</span>` : ''}
              </div>
            </td>
            <td class="price-cell">${formatPrice(ticker.current_price, ticker.currency)}</td>
            <td class="score-cell">${scoreBar(ticker.quality_score)}</td>
            <td class="score-cell">${scoreBar(ticker.value_score)}</td>
            <td class="score-cell">${scoreBar(ticker.momentum_score)}</td>
            <td><span class="maestro-score">${ticker.maestro_score != null ? ticker.maestro_score.toFixed(1) : '—'}</span></td>
            <td>${formatMomentum(ticker.momentum_6m)}</td>
            <td class="vol-cell">${formatVol(ticker.liquidity_daily_vol)}</td>
            <td>
              ${ticker.liquidity_pass
                ? '<span class="badge badge-pass">PASS</span>'
                : '<span class="badge badge-fail">FAIL</span>'}
            </td>
          </tr>
        `;
      }

      function getFilteredSorted() {
        let rows = [...allData];

        // Filter
        if (currentFilter === 'pass') {
          rows = rows.filter(r => r.liquidity_pass);
        } else if (currentFilter === 'fail') {
          rows = rows.filter(r => !r.liquidity_pass);
        }

        // Sort (descending for scores, ascending for name)
        rows.sort((a, b) => {
          const va = a[currentSort] ?? -Infinity;
          const vb = b[currentSort] ?? -Infinity;
          if (typeof va === 'string') return va.localeCompare(vb);
          return vb - va;
        });

        return rows;
      }

      function renderTable() {
        const rows = getFilteredSorted();
        const tbody = document.getElementById('factor-tbody');

        if (rows.length === 0) {
          tbody.innerHTML = `<tr><td colspan="10" style="text-align: center; padding: 32px; color: var(--text-muted, #888);">無符合條件的資料</td></tr>`;
          return;
        }

        tbody.innerHTML = rows.map((ticker, i) => renderTickerRow(ticker, i + 1)).join('');
      }

      function updateSortHeaders() {
        document.querySelectorAll('.factor-table th[data-col]').forEach(th => {
          th.classList.toggle('sorted', th.dataset.col === currentSort);
        });
      }

      // ─── Event Binding ────────────────────────────────────────────────────────
      function bindToolbar() {
        document.querySelectorAll('.sort-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            currentSort = btn.dataset.sort;
            document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            updateSortHeaders();
            renderTable();
          });
        });

        document.querySelectorAll('.filter-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            currentFilter = btn.dataset.filter;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderTable();
          });
        });

        document.querySelectorAll('.factor-table th[data-col]').forEach(th => {
          th.addEventListener('click', () => {
            currentSort = th.dataset.col;
            document.querySelectorAll('.sort-btn').forEach(b => {
              b.classList.toggle('active', b.dataset.sort === currentSort);
            });
            updateSortHeaders();
            renderTable();
          });
        });
      }

      // ─── Data Loading ─────────────────────────────────────────────────────────
      async function loadData() {
        const res = await fetch('./data/factor_analysis.json');
        if (!res.ok) throw new Error('Failed to load factor analysis data');
        return await res.json();
      }

      function showError(msg) {
        document.getElementById('factor-tbody').innerHTML = `
          <tr>
            <td colspan="10">
              <div class="error-state">
                <h3>資料尚未生成</h3>
                <p>${msg}</p>
                <p>請先執行 <code>build-analysis</code>，再執行 <code>build-dashboard</code></p>
              </div>
            </td>
          </tr>
        `;
        document.getElementById('kpi-total').textContent = '—';
        document.getElementById('kpi-pass').textContent  = '—';
        document.getElementById('kpi-rate').textContent  = '—';
      }

      // ─── Init ─────────────────────────────────────────────────────────────────
      document.addEventListener('DOMContentLoaded', async () => {
        bindToolbar();
        updateSortHeaders();

        try {
          const data = await loadData();

          // Support both array format and {summary, tickers} object format
          const rawTickers = Array.isArray(data) ? data : (data.tickers || []);
          const summary    = Array.isArray(data) ? {} : (data.summary || {});

          // Normalize nested fields to flat keys expected by render functions
          allData = rawTickers.map(t => ({
            ...t,
            quality_score:     t.factor_scores?.quality   ?? t.quality_score,
            value_score:       t.factor_scores?.value     ?? t.value_score,
            momentum_score:    t.factor_scores?.momentum  ?? t.momentum_score,
            momentum_6m:       t.momentum_6m_pct          ?? t.momentum_6m,
            liquidity_pass:    (t.liquidity_metrics?.status ?? t.liquidity_pass) === 'PASS' || t.liquidity_pass === true,
            liquidity_daily_vol: t.liquidity_metrics?.daily_dollar_vol ?? t.liquidity_daily_vol,
          }));

          renderSummary(summary);

          renderTable();
        } catch (err) {
          showError('尚未生成資料，請先執行 build-analysis，再執行 build-dashboard');
        }
      });
    </script>
  </body>
</html>
